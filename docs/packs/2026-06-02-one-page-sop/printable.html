<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>One-Page SOP Builder Worksheet</title>
  <link rel="stylesheet" href="../../styles.css">
</head>
<body>
  <main class="print-sheet">
    <p class="pack-date">June 02, 2026</p>
    <h1>One-Page SOP Builder Worksheet</h1>
    <p>A worksheet for documenting one repeatable task so someone else can follow it.</p>
    <div class="print-grid">
      <section class="print-box"><strong>Name the task and when it starts.</strong><br><span>Notes:</span></section>
<section class="print-box"><strong>List the tools and files needed.</strong><br><span>Notes:</span></section>
<section class="print-box"><strong>Write the steps in order.</strong><br><span>Notes:</span></section>
<section class="print-box"><strong>Describe the done state and common mistake.</strong><br><span>Notes:</span></section>
    </div>
  </main>
</body>
</html>
