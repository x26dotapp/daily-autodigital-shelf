<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>One-Page SOP Builder Checklist</title>
  <link rel="stylesheet" href="../../styles.css">
</head>
<body>
  <main class="print-sheet">
    <p class="pack-date">June 02, 2026</p>
    <h1>One-Page SOP Builder Checklist</h1>
    <div class="print-grid">
      <section class="print-box"><strong>[ ] Task named</strong><br><span>Proof or note:</span></section>
<section class="print-box"><strong>[ ] Inputs listed</strong><br><span>Proof or note:</span></section>
<section class="print-box"><strong>[ ] Steps ordered</strong><br><span>Proof or note:</span></section>
<section class="print-box"><strong>[ ] Done state defined</strong><br><span>Proof or note:</span></section>
<section class="print-box"><strong>[ ] Common mistake noted</strong><br><span>Proof or note:</span></section>
    </div>
  </main>
</body>
</html>
