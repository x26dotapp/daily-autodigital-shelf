<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simple Order Form Draft Checklist</title>
  <link rel="stylesheet" href="../../styles.css">
</head>
<body>
  <main class="print-sheet">
    <p class="pack-date">May 12, 2026</p>
    <h1>Simple Order Form Draft Checklist</h1>
    <div class="print-grid">
      <section class="print-box"><strong>[ ] Offer/request named</strong><br><span>Proof or note:</span></section>
<section class="print-box"><strong>[ ] Required fields listed</strong><br><span>Proof or note:</span></section>
<section class="print-box"><strong>[ ] Optional fields separated</strong><br><span>Proof or note:</span></section>
<section class="print-box"><strong>[ ] Confirmation message written</strong><br><span>Proof or note:</span></section>
<section class="print-box"><strong>[ ] No payment info collected here</strong><br><span>Proof or note:</span></section>
    </div>
  </main>
</body>
</html>
