<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simple Order Form Draft Worksheet</title>
  <link rel="stylesheet" href="../../styles.css">
</head>
<body>
  <main class="print-sheet">
    <p class="pack-date">May 12, 2026</p>
    <h1>Simple Order Form Draft Worksheet</h1>
    <p>A draft sheet for designing a small order or request form before building it online.</p>
    <div class="print-grid">
      <section class="print-box"><strong>Write what the buyer is requesting.</strong><br><span>Notes:</span></section>
<section class="print-box"><strong>List the required fields only.</strong><br><span>Notes:</span></section>
<section class="print-box"><strong>Name optional details that can wait.</strong><br><span>Notes:</span></section>
<section class="print-box"><strong>Write the confirmation message.</strong><br><span>Notes:</span></section>
    </div>
  </main>
</body>
</html>
