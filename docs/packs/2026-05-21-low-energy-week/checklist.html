<html lang="en">

  <title>Low-Energy Week Planner Checklist</title>

<body>
  <main class="print-sheet">
    <p class="pack-date">May 21, 2026</p>

      <section class="print-box"><strong>[ ] One anchor task chosen</strong><br><span>Proof or note:</span></section>
<section class="print-box"><strong>[ ] Fallback version written</strong><br><span>Proof or note:</span></section>
<section class="print-box"><strong>[ ] Breaks protected</strong><br><span>Proof or note:</span></section>
<section class="print-box"><strong>[ ] Shutdown rule visible</strong><br><span>Proof or note:</span></section>
<section class="print-box"><strong>[ ] No overpacked task list</strong><br><span>Proof or note:</span></section>
    </div>
  </main>
</body>
</html>
