<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simple Content Calendar Checklist</title>
  <link rel="stylesheet" href="../../styles.css">
</head>
<body>
  <main class="print-sheet">
    <p class="pack-date">May 27, 2026</p>
    <h1>Simple Content Calendar Checklist</h1>
    <div class="print-grid">
      <section class="print-box"><strong>[ ] One weekly message chosen</strong><br><span>Proof or note:</span></section>
<section class="print-box"><strong>[ ] Three post ideas written</strong><br><span>Proof or note:</span></section>
<section class="print-box"><strong>[ ] Publishing day picked</strong><br><span>Proof or note:</span></section>
<section class="print-box"><strong>[ ] Reusable asset named</strong><br><span>Proof or note:</span></section>
<section class="print-box"><strong>[ ] No fake audience metrics added</strong><br><span>Proof or note:</span></section>
    </div>
  </main>
</body>
</html>
